# fly.toml app configuration file generated for Walkie-Talkie backend
app = "walkie-talkie-backend"
primary_region = "ams" # You can change this to your preferred region (e.g. "maa" for Mumbai/India, "syd" for Sydney, "sjc" for San Jose)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "walkie_talkie_data"
  destination = "/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
